<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutolStructure | Structural Engineering Workbench</title>
    <meta name="description" content="FutolStructure is a browser-based structural engineering workbench for RC building layout, tributary load review, 3D visualization, and solver handoff.">
    <meta http-equiv="refresh" content="0; url=v3/index.html">
    <link rel="icon" type="image/png" href="v3/assets/futolstructure-icon.png">
    <style>
        :root {
            color-scheme: dark;
            --bg: #0b1220;
            --panel: #111827;
            --line: #243244;
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #3b82f6;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        main {
            width: min(480px, calc(100vw - 32px));
            padding: 32px;
            border: 1px solid var(--line);
            background: var(--panel);
            border-radius: 8px;
            text-align: center;
        }

        img {
            width: 72px;
            height: 72px;
            object-fit: contain;
        }

        h1 {
            margin: 18px 0 8px;
            font-size: 1.6rem;
            letter-spacing: 0;
        }

        p {
            margin: 0 0 20px;
            color: var(--muted);
            line-height: 1.5;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            padding: 0 18px;
            border-radius: 6px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <main>
        <img src="v3/assets/futolstructure-icon.png" alt="FutolStructure logo">
        <h1>FutolStructure</h1>
        <p>Opening the structural engineering workbench.</p>
        <a href="v3/index.html">Open App</a>
    </main>
</body>

</html>
